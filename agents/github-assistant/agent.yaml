apiVersion: agentcore.example/v1alpha1
kind: Agent

metadata:
  name: github-assistant
  description: A terminal assistant that will gain read-only GitHub tools.
  tags:
    project: agentcore-yaml-lab
    managed-by: terraform

spec:
  engine:
    type: harness

  model:
    provider: bedrock
    id: amazon.nova-lite-v1:0
    temperature: 0.2
    topP: 0.9

  instructions:
    system:
      file: prompts/system.md

  limits:
    maxIterations: 8
    maxTokens: 2048
    timeoutSeconds: 120

